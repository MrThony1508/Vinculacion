{% extends "admin.html" %}

{% block contenido %}
<div class="container-fluid animate-fade-in">
  
  <div class="mb-4 text-center">
    <h4 class="fw-bold text-dark mb-1">Registro de Docente</h4>
    <p class="text-muted small">Complete la información detallada para dar de alta al nuevo catedrático.</p>
  </div>

  <div class="row justify-content-center">
    <div class="col-lg-8 col-xl-7">
      <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div style="height: 4px; background: linear-gradient(90deg, #1e1e2d, #475569);"></div>
        
        <div class="card-body p-4 p-md-5">
          <form action="{% url 'guardar_docente' %}" method="POST" id="frm_docente">
            {% csrf_token %}

            <div class="row mb-4">
              <div class="col-12 mb-3">
                <label class="form-label fw-bold text-secondary small text-uppercase">Información Personal</label>
                <hr class="mt-0 opacity-10">
              </div>
              
              <div class="col-md-12 mb-3">
                <label class="form-label small fw-semibold">Cédula de Identidad</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-card-text"></i></span>
                  <input type="text" name="cedula" id="cedulaInput" class="form-control border-start-0 ps-0" placeholder="050xxxxxxx" maxlength="10">
                  <span class="input-group-text bg-white border-start-0 d-none" id="loaderCedula">
                    <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                  </span>
                </div>
                <div id="api-error" class="error" style="display:none;"></div>
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label small fw-semibold">Nombres</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person"></i></span>
                  <input type="text" name="nombre" id="nombreInput" class="form-control border-start-0 ps-0" placeholder="Ej: Juan Carlos">
                </div>
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label small fw-semibold">Apellidos</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person"></i></span>
                  <input type="text" name="apellido" id="apellidoInput" class="form-control border-start-0 ps-0" placeholder="Ej: Pérez Armas">
                </div>
              </div>

              <div class="col-md-12 mb-3">
                <label class="form-label small fw-semibold">Correo Institucional</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
                  <input type="email" name="correo" class="form-control border-start-0 ps-0" placeholder="usuario@utc.edu.ec">
                </div>
              </div>
            </div>

            <div class="row mb-5">
              <div class="col-12 mb-3">
                <label class="form-label fw-bold text-secondary small text-uppercase">Asignación Académica</label>
                <hr class="mt-0 opacity-10">
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label small fw-semibold">Carrera</label>
                <select name="carrera" class="form-select bg-light border-0 py-2">
                  <option value="">Seleccione carrera...</option>
                  <option value="Sistemas de información">Sistemas de información</option>
                  <option value="Electromecánica">Electromecánica</option>
                  <option value="Industrial">Industrial</option>
                  <option value="Electricidad">Electricidad</option>
                  <option value="Hidráulica">Hidráulica</option>
                  <option value="Software">Software</option>
                </select>
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label small fw-semibold">Asignación de Prácticas</label>
                <select name="asignacion" class="form-select bg-light border-0 py-2">
                  <option value="">Seleccione asignación...</option>
                  <option value="PPP">PPP - Prácticas Preprofesionales</option>
                  <option value="Servicio Comunitario">Servicio Comunitario</option>
                </select>
              </div>
            </div>

            <div class="d-flex gap-3 pt-3">
              <button type="submit" class="btn btn-dark w-100 py-2 rounded-3 shadow-sm d-flex align-items-center justify-content-center gap-2" style="background-color: #1e1e2d; border: none;">
                <i class="bi bi-check-circle-fill"></i>
                <span>Finalizar Registro</span>
              </button>
              <a href="{% url 'lista_docentes' %}" class="btn btn-light border w-50 py-2 rounded-3 text-secondary fw-medium">
                Cancelar
              </a>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  /* Tus estilos existentes se mantienen */
  .form-control, .form-select {
    border-radius: 10px;
    padding: 0.6rem 0.8rem;
    font-size: 0.9rem;
    border: 1px solid #e2e8f0;
    transition: all 0.2s ease;
  }
  .form-control:focus, .form-select:focus {
    background-color: #fff;
    border-color: #cbd5e1;
    box-shadow: 0 0 0 4px rgba(71, 85, 105, 0.05);
    color: #1e293b;
  }
  .input-group-text { border-radius: 10px; border: 1px solid #e2e8f0; }
  .error { color: #e63946; font-size: 0.75rem; margin-top: 4px; font-weight: 500; }
  input.error, select.error { border-color: #fca5a5 !important; background-color: #fff1f2 !important; }
</style>

<script>
$(document).ready(function() {
  
  // --- LÓGICA DE LA API DE CÉDULA ---
  async function consultarCedula(cedula) {
      const proxyUrl = 'https://infoplacas.herokuapp.com/';
      const targetUrl = 'https://si.secap.gob.ec/sisecap/logeo_web/json/busca_persona_registro_civil.php';
      
      const $loader = $('#loaderCedula');
      const $errorDiv = $('#api-error');
      
      $loader.removeClass('d-none');
      $errorDiv.hide().text("");

      try {
          const response = await fetch(proxyUrl + targetUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
              body: new URLSearchParams({ documento: cedula, tipo: '1' })
          });

          if (!response.ok) throw new Error('Error en el servidor');

          const data = await response.json();

          if (data && data.nombres && data.apellidos) {
              $('#nombreInput').val(data.nombres);
              $('#apellidoInput').val(data.apellidos);
              // Disparar validación después de autocompletar
              $("#nombreInput").valid();
              $("#apellidoInput").valid();
          } else {
              $errorDiv.text("No se encontraron datos para esta cédula.").show();
          }
      } catch (error) {
          console.error(error);
          $errorDiv.text("Error al consultar el Registro Civil.").show();
      } finally {
          $loader.addClass('d-none');
      }
  }

  // Evento al perder el foco en el campo cédula
  $('#cedulaInput').on('blur', function() {
      const cedula = $(this).val().trim();
      // Solo consultar si tiene 10 dígitos y es válida para el validador de JQuery
      if (cedula.length === 10 && !isNaN(cedula) && $(this).valid()) {
          consultarCedula(cedula);
      }
  });

  // --- TU VALIDACIÓN EXISTENTE ---
  $.validator.addMethod("soloLetras", function(value, element) {
      return this.optional(element) || /^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$/i.test(value);
  }, "Solo se permiten letras.");

  $("#frm_docente").validate({
    errorElement: "div",
    rules: {
      nombre: { required: true, minlength: 3, soloLetras: true },
      apellido: { required: true, minlength: 3, soloLetras: true },
      cedula: { 
        required: true, 
        digits: true, 
        minlength: 10, 
        maxlength: 10,
        remote: {
          url: "{% url 'validar_cedula_unica' %}",
          type: "get"
        }
      },
      correo: { 
        required: true, 
        email: true,
        remote: {
          url: "{% url 'validar_correo_unico' %}",
          type: "get"
        }
      },
      carrera: { required: true },
      asignacion: { required: true }
    },
    messages: {
      cedula: {
        remote: "Esta cédula ya se encuentra registrada."
      },
      // ... tus otros mensajes
    },
    highlight: function(element) { $(element).addClass('error'); },
    unhighlight: function(element) { $(element).removeClass('error'); }
  });
});
</script>
{% endblock %}
