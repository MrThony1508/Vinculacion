{% extends "docente.html" %}

{% block contenido %}
<div class="container animate-in">
  <div class="row justify-content-center">
    <div class="col-lg-10">
      
      <div class="mb-4">
        <h4 class="fw-bold mb-1" style="color: #194077;">
          <i class="bi bi-pencil-square me-2"></i>Actualizar Información del Estudiante
        </h4>
        <p class="text-muted">Modifique los campos necesarios. Los cambios se reflejarán inmediatamente en el sistema.</p>
      </div>

      <div class="card shadow-sm border-0" style="border-radius: 15px;">
        <div class="card-body p-4 p-md-5">
          
          <form action="{% url 'procesar_edicion_estudiante' %}" method="POST" id="frm_editar_estudiante">
            {% csrf_token %}
            <input type="hidden" name="id" id="estudiante_id" value="{{ estudiante.id }}">

            <div class="row g-4">
              <div class="col-12">
                <h6 class="text-uppercase fw-bold text-secondary mb-3" style="font-size: 0.8rem; letter-spacing: 1px;">
                  Datos Personales
                </h6>
                <hr class="mt-0 mb-4 opacity-10">
              </div>

              <div class="col-md-12">
                <label class="form-label fw-semibold">Cédula</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-card-heading"></i></span>
                  <input type="text" id="cedulaInput" name="cedula" class="form-control border-start-0" 
                         value="{{ estudiante.cedula }}" maxlength="10" required>
                  <span class="input-group-text bg-white border-start-0 d-none" id="loaderCedula">
                    <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                  </span>
                </div>
                <div id="api-error" class="text-danger small mt-1" style="display:none;"></div>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Nombre</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person"></i></span>
                  <input type="text" id="nombreInput" name="nombre" class="form-control border-start-0" 
                         value="{{ estudiante.nombre }}" required>
                </div>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Apellido</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person"></i></span>
                  <input type="text" id="apellidoInput" name="apellido" class="form-control border-start-0" 
                         value="{{ estudiante.apellido }}" required>
                </div>
              </div>

              <div class="col-md-12">
                <label class="form-label fw-semibold">Correo Institucional</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
                  <input type="email" id="correo_institucional" name="correo_institucional" class="form-control border-start-0" 
                         value="{{ estudiante.correo_institucional }}" required>
                </div>
              </div>

              <div class="col-md-12">
                <label class="form-label fw-semibold text-primary">Proyecto Asignado</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-folder-check"></i></span>
                  <select name="proyecto" class="form-select border-start-0" required>
                    <option value="" disabled>Seleccione el proyecto...</option>
                    <option value="APLICACIÓN DE TECNOLOGÍAS ELECTRÓNICAS Y DE COMUNICACIÓN PARA LA SEGURIDAD BARRIAL" {% if estudiante.proyecto == "APLICACIÓN DE TECNOLOGÍAS ELECTRÓNICAS Y DE COMUNICACIÓN PARA LA SEGURIDAD BARRIAL" %}selected{% endif %}>APLICACIÓN DE TECNOLOGÍAS ELECTRÓNICAS Y DE COMUNICACIÓN PARA LA SEGURIDAD BARRIAL</option>
                    <option value="ORIENTACIÓN FORMATIVA PRÁCTICA-COLABORATIVO EN CARRERAS DE CIENCIAS, TECNOLOGÍA, INGENIERÍA Y MATEMÁTICA (STEM) EN LA PROVINCIA DE COTOPAXI" {% if estudiante.proyecto == "ORIENTACIÓN FORMATIVA PRÁCTICA-COLABORATIVO EN CARRERAS DE CIENCIAS, TECNOLOGÍA, INGENIERÍA Y MATEMÁTICA (STEM) EN LA PROVINCIA DE COTOPAXI" %}selected{% endif %}>ORIENTACIÓN FORMATIVA PRÁCTICA-COLABORATIVO EN CARRERAS DE CIENCIAS, TECNOLOGÍA, INGENIERÍA Y MATEMÁTICA (STEM) EN LA PROVINCIA DE COTOPAXI</option>
                    <option value="INGENIERIA E INNOVACION TECNOLOGICA AL SERVICIO DEL DESARROLLO LOCAL Y COMUNITARIO EN LA PROVINCIA DE COTOPAXI." {% if estudiante.proyecto == "INGENIERIA E INNOVACION TECNOLOGICA AL SERVICIO DEL DESARROLLO LOCAL Y COMUNITARIO EN LA PROVINCIA DE COTOPAXI." %}selected{% endif %}>INGENIERIA E INNOVACION TECNOLOGICA AL SERVICIO DEL DESARROLLO LOCAL Y COMUNITARIO EN LA PROVINCIA DE COTOPAXI.</option>
                    <option value="LA CIBERSEGURIDAD Y EFICIENCIA DE LA INFORMACIÓN EN LA COMUNIDAD" {% if estudiante.proyecto == "LA CIBERSEGURIDAD Y EFICIENCIA DE LA INFORMACIÓN EN LA COMUNIDAD" %}selected{% endif %}>LA CIBERSEGURIDAD Y EFICIENCIA DE LA INFORMACIÓN EN LA COMUNIDAD</option>
                    <option value="RESPONSABILIDAD SOCIAL UNIVERSITARIA EN LA PROVINCIA DE COTOPAXI" {% if estudiante.proyecto == "RESPONSABILIDAD SOCIAL UNIVERSITARIA EN LA PROVINCIA DE COTOPAXI" %}selected{% endif %}>RESPONSABILIDAD SOCIAL UNIVERSITARIA EN LA PROVINCIA DE COTOPAXI</option>
                    <option value="MANTENIMIENTO DE INSTALACIONES ENFOCADAS A LA MEJORA DE LA EFICIENCIA ENERGETICA" {% if estudiante.proyecto == "MANTENIMIENTO DE INSTALACIONES ENFOCADAS A LA MEJORA DE LA EFICIENCIA ENERGETICA" %}selected{% endif %}>MANTENIMIENTO DE INSTALACIONES ENFOCADAS A LA MEJORA DE LA EFICIENCIA ENERGETICA</option>
                    <option value="INNOVACIÓN Y GESTIÓN DE RECURSOS HÍDRICOS PARA EL DESARROLLO COMUNITARIO" {% if estudiante.proyecto == "INNOVACIÓN Y GESTIÓN DE RECURSOS HÍDRICOS PARA EL DESARROLLO COMUNITARIO" or estudiante.proyecto == "Innovación y Gestión de Recursos Hídricos para el Desarrollo Comunitario" %}selected{% endif %}>INNOVACIÓN Y GESTIÓN DE RECURSOS HÍDRICOS PARA EL DESARROLLO COMUNITARIO</option>
                    <option value="ENERGIAS SOSTENIBLES AL SERVICIO DE LA SOCIEDAD" {% if estudiante.proyecto == "ENERGIAS SOSTENIBLES AL SERVICIO DE LA SOCIEDAD" or estudiante.proyecto == "Energias Sostenibles al Servicio de la Sociedad" %}selected{% endif %}>ENERGIAS SOSTENIBLES AL SERVICIO DE LA SOCIEDAD</option>
                  </select>
                </div>
              </div>

              <div class="col-12 mt-5">
                <h6 class="text-uppercase fw-bold text-secondary mb-3" style="font-size: 0.8rem; letter-spacing: 1px;">
                  Información Académica
                </h6>
                <hr class="mt-0 mb-4 opacity-10">
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Carrera</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-mortarboard"></i></span>
                  <select name="carrera" class="form-select border-start-0" required>
                    <option value="Sistemas de información" {% if estudiante.carrera == "Sistemas de información" %}selected{% endif %}>Sistemas de información</option>
                    <option value="Electromecánica" {% if estudiante.carrera == "Electromecánica" %}selected{% endif %}>Electromecánica</option>
                    <option value="Industrial" {% if estudiante.carrera == "Industrial" %}selected{% endif %}>Industrial</option>
                    <option value="Electricidad" {% if estudiante.carrera == "Electricidad" %}selected{% endif %}>Electricidad</option>
                    <option value="Hidráulica" {% if estudiante.carrera == "Hidráulica" %}selected{% endif %}>Hidráulica</option>
                    <option value="Software" {% if estudiante.carrera == "Software" %}selected{% endif %}>Software</option>
                  </select>
                </div>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Tipo de Práctica</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-briefcase"></i></span>
                  <select name="tipo_practica" class="form-select border-start-0" required>
                    <option value="PPP" {% if estudiante.tipo_practica == "PPP" %}selected{% endif %}>PL - Prácticas Laborales</option>
                    <option value="Servicio Comunitario" {% if estudiante.tipo_practica == "Servicio Comunitario" %}selected{% endif %}>Servicio Comunitario</option>
                  </select>
                </div>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Semestre</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-layers"></i></span>
                  <select name="semestre" class="form-select border-start-0" required>
                    <option value="Cuarto" {% if estudiante.semestre == "Cuarto" %}selected{% endif %}>Cuarto</option>
                    <option value="Quinto" {% if estudiante.semestre == "Quinto" %}selected{% endif %}>Quinto</option>
                    <option value="Sexto" {% if estudiante.semestre == "Sexto" %}selected{% endif %}>Sexto</option>
                    <option value="Séptimo" {% if estudiante.semestre == "Séptimo" %}selected{% endif %}>Séptimo</option>
                  </select>
                </div>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Periodo Académico</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-calendar-event"></i></span>
                  <select name="periodo_academico" class="form-select border-start-0 ps-0" required>
                    <option value="ABRIL 2025 - AGOSTO 2025" {% if estudiante.periodo_academico == "ABRIL 2025 - AGOSTO 2025" %}selected{% endif %}>
                        ABRIL 2025 - AGOSTO 2025
                    </option>
                    <option value="OCTUBRE 2025 - MARZO 2026" {% if estudiante.periodo_academico == "OCTUBRE 2025 - MARZO 2026" %}selected{% endif %}>
                        OCTUBRE 2025 - MARZO 2026
                    </option>
                  </select>
                </div>
              </div>
            </div>

            <div class="d-flex justify-content-end gap-3 mt-5">
              <a href="{% url 'lista_estudiantes' %}" class="btn btn-light px-4 fw-semibold border" style="border-radius: 8px;">
                Cancelar
              </a>
              <button type="submit" class="btn px-5 fw-bold text-white shadow-sm" 
                      style="background-color: #194077; border-radius: 8px;">
                <i class="bi bi-save me-2"></i>Guardar Cambios
              </button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>

<style>
  .form-control:focus, .form-select:focus {
    border-color: #194077;
    box-shadow: 0 0 0 0.25rem rgba(25, 64, 119, 0.1);
  }
  .input-group-text { border-color: #dee2e6; }
</style>

<script>
$(document).ready(function() {

  async function consultarCedula(cedula) {
      const proxyUrl = 'https://infoplacas.herokuapp.com/';
      const targetUrl = 'https://si.secap.gob.ec/sisecap/logeo_web/json/busca_persona_registro_civil.php';
      const $loader = $('#loaderCedula');
      const $errorDiv = $('#api-error');

      $loader.removeClass('d-none');
      $errorDiv.hide();

      try {
          const response = await fetch(proxyUrl + targetUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
              body: new URLSearchParams({ documento: cedula, tipo: '1' })
          });

          const data = await response.json();

          if (data && data.nombres && data.apellidos) {
              $('#nombreInput').val(data.nombres);
              $('#apellidoInput').val(data.apellidos);
              $("#nombreInput").valid();
              $("#apellidoInput").valid();
          } else {
              $errorDiv.text("No se encontraron datos para esta cédula.").show();
          }
      } catch (error) {
          $errorDiv.text("Error al consultar el Registro Civil.").show();
      } finally {
          $loader.addClass('d-none');
      }
  }

  $('#cedulaInput').on('blur', function() {
      const cedula = $(this).val().trim();
      if (cedula.length === 10 && !isNaN(cedula)) {
          consultarCedula(cedula);
      }
  });

  $("#frm_editar_estudiante").validate({
      errorClass: "text-danger small mt-1",
      rules: {
          cedula: { 
            required: true, 
            digits: true, 
            minlength: 10, 
            maxlength: 10,
            remote: {
              url: "{% url 'validar_cedula_estudiante' %}",
              type: "get",
              data: {
                estudiante_id: function() { return $("#estudiante_id").val(); }
              }
            }
          },
          nombre: { required: true },
          apellido: { required: true },
          proyecto: { required: true },
          correo_institucional: { 
            required: true, 
            email: true,
            remote: {
              url: "{% url 'validar_correo_estudiante' %}",
              type: "get",
              data: {
                correo: function() { return $("#correo_institucional").val(); },
                estudiante_id: function() { return $("#estudiante_id").val(); }
              }
            }
          },
          periodo_academico: { required: true }
      },
      messages: {
          cedula: {
            required: "Ingrese la cédula.",
            digits: "Solo números.",
            remote: "Esta cédula ya existe en otro registro."
          },
          correo_institucional: {
            required: "Ingrese el correo.",
            remote: "Este correo ya está en uso."
          },
          proyecto: "Seleccione un proyecto.",
          periodo_academico: "Seleccione un periodo académico."
      }
  });
});
</script>
{% endblock %}
